        // ==========================================

        const ContactModal = ({ isOpen, onClose }) => {
          const [subject, setSubject] = React.useState('');
          const [message, setMessage] = React.useState('');

          const handleSubmit = (e) => {
            e.preventDefault();
            const mailtoUrl = `mailto:info@gosmartic.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(message)}`;
            window.location.href = mailtoUrl;
            onClose();
            setSubject('');
            setMessage('');
          };

          if (!isOpen) return null;

          return (
            <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
              <div className="bg-white rounded-2xl max-w-lg w-full p-6 shadow-2xl border border-gray-100 font-sans text-gray-900">

                    </svg>
                    Contatta GoSmArtic

                  <button onClick={onClose} className="text-gray-400 hover:text-gray-600 font-bold text-lg">&times;</button>
                </div>
                <p className="text-sm text-gray-500 mb-4">
                  Scrivi direttamente a <strong className="text-gray-900">info@gosmartic.com</strong> o usa il modulo:
                </p>
                <form onSubmit={handleSubmit} className="space-y-4">
                  <div>
                    <label className="block text-xs font-bold uppercase text-gray-600 mb-1">Oggetto</label>
                    <input 
                      type="text" required value={subject} onChange={(e) => setSubject(e.target.value)}
                      placeholder="Esempio: Richiesta di informazioni"
                      className="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                    />
                  </div>
                  <div>
                    <label className="block text-xs font-bold uppercase text-gray-600 mb-1">Messaggio</label>
                    <textarea 
                      rows="4" required value={message} onChange={(e) => setMessage(e.target.value)}
                      placeholder="Scrivi qui il tuo messaggio..."
                      className="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                    />
                  </div>
                  <div className="flex gap-3 pt-2">
                    <button type="button" onClick={onClose} className="w-1/3 bg-gray-100 hover:bg-gray-200 text-gray-700 py-2.5 rounded-lg text-sm font-semibold transition-colors">Annulla</button>
                    <button type="submit" className="w-2/3 bg-[#2563eb] hover:bg-blue-700 text-white py-2.5 rounded-lg text-sm font-semibold transition-colors flex items-center justify-center gap-2">
                      <span>Invia Email</span>
                    </button>
                  </div>
                </form>
              </div>
            </div>
          );
        };

        // ==========================================
        // COMPONENTE PRINCIPAL (APP LIMPIA)
        // ==========================================
        const BLOG_POSTS_URL = "https://raw.githubusercontent.com/Villajr130/gosmartic-offers/main/data/blog-posts.json";

const useBlogPosts = () => {
  const [data, setData] = React.useState({ posts: [] });
  React.useEffect(() => {
    fetch(BLOG_POSTS_URL, { cache: 'no-store' })
      .then(res => res.json())
      .then(setData)
      .catch(err => {
        console.error('Error cargando blog-posts.json:', err);
        setData({ posts: [] });
      });
  }, []);
  return data;
};

const useHashRoute = () => {
  const [hash, setHash] = React.useState(window.location.hash);
  React.useEffect(() => {
    const onHashChange = () => setHash(window.location.hash);
    window.addEventListener('hashchange', onHashChange);
    return () => window.removeEventListener('hashchange', onHashChange);
  }, []);
  return hash;
};

const BlogListView = ({ posts }) => {
  if (!posts || posts.length === 0) {
    return (
      <div className="max-w-5xl mx-auto px-4 py-20 text-center text-gray-400 font-sans">
        Nessun articolo pubblicato ancora.
      </div>
    );
  }
  return (
    <div className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
      <h1 className="font-sans font-bold text-3xl sm:text-4xl text-gray-900 mb-10">Blog GoSmArtic</h1>
      <div className="grid grid-cols-1 sm:grid-cols-2 gap-8">
        {posts.map(post => (
          <a key={post.id} href={`#blog/${post.slug}`} className="block bg-white rounded-xl shadow-sm hover:shadow-md border border-gray-100 overflow-hidden transition-all duration-300">
            <img src={post.imagenUrl} alt={post.titulo} className="w-full h-48 object-cover" />
            <div className="p-5">
              <span className="text-[10px] font-bold text-[#06b6d4] uppercase tracking-widest mb-1 block">{post.categoria}</span>
              <h2 className="font-sans font-bold text-gray-900 text-lg mb-2 line-clamp-2">{post.titulo}</h2>
              <p className="font-sans text-sm text-gray-500 line-clamp-3">{post.resumen}</p>
              <p className="font-sans text-xs text-gray-400 mt-3">{post.fecha}</p>
            </div>
          </a>
        ))}
      </div>
    </div>
  );
};

const BlogPostView = ({ post }) => {
  if (!post) {
    return (
      <div className="max-w-3xl mx-auto px-4 py-20 text-center font-sans text-gray-500">
        Articolo non trovato. <a href="#blog" className="text-[#2563eb] font-bold">Torna al blog</a>
      </div>
    );
  }
  return (
    <article className="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-16 font-sans">
      <a href="#blog" className="inline-flex items-center text-sm font-bold text-[#2563eb] hover:underline mb-6">&larr; Torna al blog</a>
      <span className="text-[10px] font-bold text-[#06b6d4] uppercase tracking-widest mb-2 block">{post.categoria}</span>
      <h1 className="font-sans font-bold text-3xl sm:text-4xl text-gray-900 mb-4">{post.titulo}</h1>
      <p className="text-xs text-gray-400 mb-8">{post.fecha}{post.autor ? ` · ${post.autor}` : ''}</p>
      {post.imagenUrl && (
        <img src={post.imagenUrl} alt={post.titulo} className="w-full rounded-xl mb-8 object-cover max-h-96" />
      )}
      <div className="prose prose-sm sm:prose-base max-w-none text-gray-800" dangerouslySetInnerHTML={{ __html: post.contenido_html }} />
    </article>
  );
};

const App = () => {
  const [view, setView] = React.useState('home');
  const [activeFilter, setActiveFilter] = React.useState('all');
  const [isContactOpen, setIsContactOpen] = React.useState(false);
  const blogData = useBlogPosts();
  const hash = useHashRoute();

  const blogSlugMatch = hash.match(/^#blog\/(.+)$/);
  const blogSlug = blogSlugMatch ? decodeURIComponent(blogSlugMatch[1]) : null;
  const isBlogList = hash === '#blog';

  React.useEffect(() => { if (hash.startsWith('#blog')) window.scrollTo(0, 0); }, [hash]);

  let mainContent;
  if (blogSlug) {
    const post = (blogData.posts || []).find(p => p.slug === blogSlug);
    mainContent = <BlogPostView post={post} />;
  } else if (isBlogList) {
    mainContent = <BlogListView posts={blogData.posts || []} />;
  } else if (view === 'privacy') {
    mainContent = <PrivacyPolicyView onBack={() => setView('home')} />;
  } else if (view === 'termini') {
    mainContent = <TermsOfServiceView onBack={() => setView('home')} />;
  } else {
    mainContent = (
      <React.Fragment>
        <Hero data={INITIAL_HERO} />
        <FeaturedSection productos={INITIAL_PRODUCTS} />
        <AllProductsSection 
          productos={INITIAL_PRODUCTS} 
          activeFilter={activeFilter} 
          onResetFilter={() => setActiveFilter('all')} 
        />
      </React.Fragment>
    );
  }

  return (
    <div className="flex flex-col min-h-screen">
      <Header 
        onNavigate={setView} 
        activeFilter={activeFilter}
        onSelectCategory={setActiveFilter}
      />
      <main className="flex-grow">{mainContent}</main>
      <Footer 
        onNavigate={setView} 
        onSelectCategory={setActiveFilter} 
        onContactClick={() => setIsContactOpen(true)} 
      />
      <ContactModal isOpen={isContactOpen} onClose={() => setIsContactOpen(false)} />
    </div>
  );
};

        // Renderizar la aplicación en el DOM
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);

    </script>
</body>
</html>
