                      <li><button onClick={(e) => { e.preventDefault(); onNavigate('privacy'); }} className="hover:text-[#06b6d4] transition-colors text-left block">Privacy Policy</button></li>
                      <li><button onClick={(e) => { e.preventDefault(); onNavigate('termini'); }} className="hover:text-[#06b6d4] transition-colors text-left block">Termini di servizio</button></li>
                      <li><button onClick={(e) => { e.preventDefault(); onContactClick(); }} className="hover:text-[#06b6d4] transition-colors text-left block mt-1">Contatti</button></li>
                    </ul>
                  </div>
                </div>
                <div className="border-t border-gray-900 my-8"></div>
                <div className="text-center space-y-4">
                  <p className="text-sm text-gray-500">&copy; 2026 GoSmArtic. Tutti i diritti riservati.</p>
                  <p className="text-xs text-gray-600 max-w-3xl mx-auto leading-normal">
                    Disclaimer di affiliazione: GoSmArtic partecipa al Programma Affiliazione Amazon EU. La commissione non comporta alcun costo aggiuntivo per l'utente.
                  </p>
                </div>
              </div>
            </footer>
          );
        };

        // ==========================================
        // COMPONENTE: MODAL DE CONTACTO
        // ==========================================
        const ContactModal = ({ isOpen, onClose }) => {
          const [subject, setSubject] = React.useState('');
          const [message, setMessage] = React.useState('');

          const handleSubmit = (e) => {
            e.preventDefault();
            const mailtoUrl = `mailto:info@gosmartic.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(message)}`;
            window.location.href = mailtoUrl;
            onClose();
            setSubject('');
            setMessage('');
          };

          if (!isOpen) return null;

          return (
            <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
              <div className="bg-white rounded-2xl max-w-lg w-full p-6 shadow-2xl border border-gray-100 font-sans text-gray-900">
                <div className="flex justify-between items-center border-b border-gray-100 pb-3 mb-4">
                  <h3 className="text-xl font-bold text-gray-900 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-[#2563eb]" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                      <path strokeLinecap="round" strokeLinejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                    Contatta GoSmArtic
                  </h3>
                  <button onClick={onClose} className="text-gray-400 hover:text-gray-600 font-bold text-lg">&times;</button>
                </div>

                <p className="text-sm text-gray-500 mb-4">
                  Hai domande, proposte commerciali o feedback sul sito? Inviaci un'e-mail direttamente a <strong className="text-gray-900">info@gosmartic.com</strong> o usa il modulo sottostante.
                </p>

                <form onSubmit={handleSubmit} className="space-y-4">
                  <div>
                    <label className="block text-xs font-bold uppercase text-gray-600 mb-1">Oggetto dell'e-mail</label>
                    <input 
                      type="text" 
                      required
                      value={subject}
                      onChange={(e) => setSubject(e.target.value)}
                      placeholder="Esempio: Richiesta di informazioni"
                      className="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                    />
                  </div>
                  <div>
                    <label className="block text-xs font-bold uppercase text-gray-600 mb-1">Messaggio</label>
                    <textarea 
                      rows="4"
                      required
                      value={message}
                      onChange={(e) => setMessage(e.target.value)}
                      placeholder="Scrivi qui il tuo messaggio..."
                      className="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                    />
                  </div>

                  <div className="flex gap-3 pt-2">
                    <button 
                      type="button" 
                      onClick={onClose}
                      className="w-1/3 bg-gray-100 hover:bg-gray-200 text-gray-700 py-2.5 rounded-lg text-sm font-semibold transition-colors"
                    >
                      Annulla
                    </button>
                    <button 
                      type="submit"
                      className="w-2/3 bg-[#2563eb] hover:bg-blue-700 text-white py-2.5 rounded-lg text-sm font-semibold transition-colors flex items-center justify-center gap-2"
                    >
                      <span>Invia Email</span>
                      <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                        <path strokeLinecap="round" strokeLinejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                      </svg>
                    </button>
                  </div>
                </form>
              </div>
            </div>
          );
        };

        // ==========================================
        // COMPONENTE: MODAL DE LOGIN
        // ==========================================
        const LoginModal = ({ isOpen, onClose, onLoginSuccess }) => {
          const [password, setPassword] = React.useState('');
          const [error, setError] = React.useState('');

          const MASTER_PASSWORD = "admin2026"; 

          const handleSubmit = (e) => {
            e.preventDefault();
            if (password === MASTER_PASSWORD) {
              setError('');
              setPassword('');
              onLoginSuccess();
            } else {
              setError('❌ Password errata. Accesso negato.');
            }
          };

          if (!isOpen) return null;

          return (
            <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
              <div className="bg-white rounded-2xl max-w-md w-full p-6 shadow-2xl border border-gray-100 font-sans text-gray-900">
                <div className="text-center mb-6">
                  <div className="w-12 h-12 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-3">
                    <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                      <path strokeLinecap="round" strokeLinejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                  </div>
                  <h3 className="text-xl font-bold">Accesso Amministratore</h3>
                  <p className="text-sm text-gray-500 mt-1">Inserisci la password master per accedere alla gestione prodotti.</p>
                </div>

                <form onSubmit={handleSubmit} className="space-y-4">
                  <div>
                    <input 
                      type="password"
                      required
                      value={password}
                      onChange={(e) => setPassword(e.target.value)}
                      placeholder="Password"
                      className="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-center tracking-widest font-mono"
                    />
                  </div>

                  {error && <p className="text-xs text-red-600 text-center font-medium">{error}</p>}

                  <div className="flex gap-2 pt-2">
                    <button type="button" onClick={onClose} className="w-1/2 bg-gray-100 hover:bg-gray-200 text-gray-700 py-2 rounded-lg text-sm font-semibold transition-colors">
                      Annulla
                    </button>
                    <button type="submit" className="w-1/2 bg-black hover:bg-gray-900 text-white py-2 rounded-lg text-sm font-semibold transition-colors">
                      Entra
                    </button>
                  </div>
                </form>
              </div>
            </div>
          );
        };

        // ==========================================
        // COMPONENTE: PANEL DE ADMINISTRACIÓN
        // ==========================================
        const AdminPanel = ({ productos, onUpdateProducts, onBack, onResetToDefault }) => {
          const [isEditing, setIsEditing] = React.useState(false);
          const [currentId, setCurrentId] = React.useState(null);

          const [formData, setFormData] = React.useState({
            nombre: '',
            categoria: 'PC & Laptop',
            descripcionCorta: '',
            imagenUrl: '',
            linkAmazon: ''
          });

          const handleInputChange = (e) => {
            const { name, value } = e.target;
            setFormData({ ...formData, [name]: value });
          };

          const handleEditClick = (p) => {
            setIsEditing(true);
            setCurrentId(p.id);
            setFormData({
              nombre: p.nombre,
              categoria: p.categoria,
              descripcionCorta: p.descripcionCorta,
              imagenUrl: p.imagenUrl,
              linkAmazon: p.linkAmazon
            });
          };

          const handleSubmit = (e) => {
            e.preventDefault();
            if (!formData.nombre || !formData.descripcionCorta) return;

            if (isEditing) {
              const updated = productos.map(p => p.id === currentId ? { ...p, ...formData } : p);
              onUpdateProducts(updated);
              setIsEditing(false);
              setCurrentId(null);
            } else {
              const newProduct = {
                id: Date.now(),
                ...formData
              };
              onUpdateProducts([...productos, newProduct]);
            }

            setFormData({
              nombre: '',
              categoria: 'PC & Laptop',
              descripcionCorta: '',
              imagenUrl: '',
              linkAmazon: ''
            });
          };

          const handleCancelEdit = () => {
            setIsEditing(false);
            setCurrentId(null);
            setFormData({
              nombre: '',
              categoria: 'PC & Laptop',
              descripcionCorta: '',
              imagenUrl: '',
              linkAmazon: ''
            });
          };

          const handleDelete = (id) => {
            if (window.confirm("Eliminare questo prodotto?")) {
              onUpdateProducts(productos.filter(p => p.id !== id));
              if (currentId === id) handleCancelEdit();
            }
          };

          const handleResetClick = () => {
            if (window.confirm("ATTENZIONE: Questo cancellerà tutte le modifiche personalizzate e ripristinerà i prodotti iniziali di fabbrica. Continuare?")) {
              onResetToDefault();
              handleCancelEdit();
            }
          };

          return (
            <div className="max-w-6xl mx-auto px-4 py-12 font-sans">
              <div className="flex flex-col sm:flex-row justify-between sm:items-center mb-8 pb-4 border-b border-gray-200 gap-4">
                <div>
                  <h1 className="text-3xl font-bold text-gray-900">Pannello di Controllo Catalogo</h1>
                  <p className="text-sm text-gray-500">I dati sono salvati localmente sul browser. Aggiungi o modifica i prodotti.</p>
                </div>
                <div className="flex gap-2">
                  <button onClick={handleResetClick} className="bg-red-50 text-red-600 border border-red-200 px-4 py-2.5 rounded-lg text-sm font-semibold hover:bg-red-100 transition-colors">
                    Reset Fabbrica
                  </button>
                  <button onClick={onBack} className="bg-black text-white px-5 py-2.5 rounded-lg text-sm font-semibold hover:bg-gray-800 transition-colors">
                    &larr; Esci dal Pannello
                  </button>
                </div>
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                {/* FORMULARIO */}
                <div className="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm h-fit">
                  <h3 className="text-lg font-bold text-gray-900 mb-4">
                    {isEditing ? '📝 Modifica Prodotto' : '➕ Aggiungi Nuovo Prodotto'}
                  </h3>
                  <form onSubmit={handleSubmit} className="space-y-4">
                    <div>
                      <label className="block text-xs font-bold uppercase text-gray-600 mb-1">Nome del Prodotto</label>
                      <input 
                        type="text" name="nombre" required value={formData.nombre} onChange={handleInputChange}
                        placeholder="Es. Dell 15 Laptop"
                        className="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"
                      />
                    </div>
                    <div>
                      <label className="block text-xs font-bold uppercase text-gray-600 mb-1">Categoria</label>
                      <select 
                        name="categoria" value={formData.categoria} onChange={handleInputChange}
                        className="w-full border border-gray-300 rounded-lg p-2.5 text-sm bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none"
                      >
                        <option value="PC & Laptop">PC & Laptop</option>
                        <option value="Telefoni">Telefoni</option>
                        <option value="Smart TV">Smart TV</option>
                        <option value="Accessori Tech">Accessori Tech</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-xs font-bold uppercase text-gray-600 mb-1">Descrizione Breve</label>
                      <textarea 
                        name="descripcionCorta" required rows="3" value={formData.descripcionCorta} onChange={handleInputChange}
                        placeholder="Inserisci i punti di forza del prodotto..."
                        className="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"
                      />
                    </div>
                    <div>
                      <label className="block text-xs font-bold uppercase text-gray-600 mb-1">URL Immagine</label>
                      <input 
                        type="url" name="imagenUrl" value={formData.imagenUrl} onChange={handleInputChange}
                        placeholder="https://images.unsplash.com/..."
                        className="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"
                      />
                    </div>
                    <div>
                      <label className="block text-xs font-bold uppercase text-gray-600 mb-1">Link Affiliazione Amazon</label>
                      <input 
                        type="url" name="linkAmazon" value={formData.linkAmazon} onChange={handleInputChange}
                        placeholder="https://www.amazon.it/..."
                        className="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"
                      />
                    </div>

                    <div className="flex gap-2 pt-2">
                      <button type="submit" className={`flex-grow py-2.5 rounded-lg text-sm font-semibold text-white transition-colors ${isEditing ? 'bg-amber-500 hover:bg-amber-600' : 'bg-blue-600 hover:bg-blue-700'}`}>
                        {isEditing ? 'Salva Modifiche' : 'Salva Prodotto'}
                      </button>
                      {isEditing && (
                        <button type="button" onClick={handleCancelEdit} className="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2.5 rounded-lg text-sm font-semibold transition-colors">
                          Annulla
                        </button>
                      )}
                    </div>
                  </form>
                </div>

                {/* TABLA DE PRODUCTOS */}
                <div className="lg:col-span-2 bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
                  <div className="p-4 bg-gray-50 border-b border-gray-200">
                    <h3 className="font-bold text-gray-900">Articoli in Database ({productos.length})</h3>
                  </div>
                  <div className="overflow-x-auto">
                    <table className="w-full border-collapse text-left text-sm">
                      <thead>
                        <tr className="bg-gray-100 font-bold text-gray-600 border-b border-gray-200">
                          <th className="p-4">Titolo</th>
                          <th className="p-4">Categoria</th>
                          <th className="p-4 text-right">Azioni</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-gray-100">
                        {productos.map(p => (
                          <tr key={p.id} className="hover:bg-gray-50 transition-colors">
                            <td className="p-4 font-semibold text-gray-900 max-w-[240px] truncate">{p.nombre}</td>
                            <td className="p-4">
                              <span className="bg-gray-100 text-gray-800 text-xs px-2.5 py-1 rounded-full font-medium">
                                {p.categoria}
                              </span>
                            </td>
                            <td className="p-4 text-right space-x-2 whitespace-nowrap">
                              <button onClick={() => handleEditClick(p)} className="text-amber-600 hover:text-amber-800 font-bold text-xs bg-amber-50 hover:bg-amber-100 px-3 py-1.5 rounded-md transition-colors">
                                Modifica
                              </button>
                              <button onClick={() => handleDelete(p.id)} className="text-red-600 hover:text-red-800 font-bold text-xs bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-md transition-colors">
                                Disattiva
                              </button>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            </div>
          );
        };

        // ==========================================
        // COMPONENTE PRINCIPAL (APP WITH LOCALSTORAGE)
        // ==========================================
        const App = () => {
          const [view, setView] = React.useState('home'); 
          const [activeFilter, setActiveFilter] = React.useState('all');
          const [isContactOpen, setIsContactOpen] = React.useState(false);
          const [isLoginOpen, setIsLoginOpen] = React.useState(false);

          // Cargar productos iniciales desde LocalStorage si existen, sino usar el array por defecto
          const [productos, setProductos] = React.useState(() => {
            const savedProducts = localStorage.getItem('gosmartic_catalog');
            return savedProducts ? JSON.parse(savedProducts) : INITIAL_PRODUCTS;
          });

          // Cada vez que el array de productos cambie, guardarlo automáticamente en LocalStorage
          React.useEffect(() => {
            localStorage.setItem('gosmartic_catalog', JSON.stringify(productos));
          }, [productos]);

          // Función para resetear a los valores de fábrica
          const resetToDefault = () => {
            setProductos(INITIAL_PRODUCTS);
          };

          return (
            <div className="flex flex-col min-h-screen">
              <Header 
                onNavigate={setView} 
                onLogoTripleClick={() => setIsLoginOpen(true)}
                activeFilter={activeFilter}
                onSelectCategory={setActiveFilter}
              />

              <main className="flex-grow">
                {view === 'home' && (
                  <React.Fragment>
                    <Hero data={INITIAL_HERO} />
                    <FeaturedSection productos={productos} />
                    <AllProductsSection 
                      productos={productos} 
                      activeFilter={activeFilter} 
                      onResetFilter={() => setActiveFilter('all')} 
                    />
                  </React.Fragment>
                )}

                {view === 'privacy' && <PrivacyPolicyView onBack={() => setView('home')} />}
                {view === 'termini' && <TermsOfServiceView onBack={() => setView('home')} />}
                {view === 'admin' && (
                  <AdminPanel 
                    productos={productos} 
                    onUpdateProducts={setProductos} 
                    onBack={() => setView('home')} 
                    onResetToDefault={resetToDefault}
                  />
                )}
              </main>

              <Footer 
                onNavigate={setView} 
                onSelectCategory={setActiveFilter} 
                onContactClick={() => setIsContactOpen(true)} 
              />

              <ContactModal isOpen={isContactOpen} onClose={() => setIsContactOpen(false)} />
              
              <LoginModal 
                isOpen={isLoginOpen} 
                onClose={() => setIsLoginOpen(false)} 
                onLoginSuccess={() => {
                  setIsLoginOpen(false);
                  setView('admin');
                }} 
              />
            </div>
          );
        };

        // Renderizar la aplicación de forma limpia en el DOM
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);

    </script>
</body>
</html>
